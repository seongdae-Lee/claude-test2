{% extends 'base.html' %}
{% block title %}BOARD - 글쓰기{% endblock %}

{% block content %}
<div style="margin-bottom:1.5rem;">
  <h2 style="font-size:1.2rem; font-weight:700; color:#e0e2e7;">새 글 작성</h2>
</div>

<form method="POST"
  style="background:#262930; border:1px solid #32363f; border-radius:10px; padding:2rem;">

  <div style="display:grid; grid-template-columns:1fr 2fr; gap:1rem; margin-bottom:1rem;">
    <div>
      <label style="display:block; margin-bottom:0.5rem; font-size:0.78rem; color:#5a5f6e; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">작성자</label>
      <input type="text" name="author" required maxlength="50" placeholder="이름"
        style="width:100%; padding:0.65rem 0.9rem; background:#1e2025; border:1px solid #3a3f4a; border-radius:7px; font-size:0.92rem; color:#cdd0d6; font-family:inherit; outline:none; transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#5b9cf6'" onblur="this.style.borderColor='#3a3f4a'">
    </div>
    <div>
      <label style="display:block; margin-bottom:0.5rem; font-size:0.78rem; color:#5a5f6e; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">제목</label>
      <input type="text" name="title" required maxlength="200" placeholder="제목을 입력하세요"
        style="width:100%; padding:0.65rem 0.9rem; background:#1e2025; border:1px solid #3a3f4a; border-radius:7px; font-size:0.92rem; color:#cdd0d6; font-family:inherit; outline:none; transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#5b9cf6'" onblur="this.style.borderColor='#3a3f4a'">
    </div>
  </div>

  <div style="margin-bottom:1.5rem;">
    <label style="display:block; margin-bottom:0.5rem; font-size:0.78rem; color:#5a5f6e; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">내용</label>
    <textarea name="content" required rows="12" placeholder="내용을 입력하세요"
      style="width:100%; padding:0.8rem 0.9rem; background:#1e2025; border:1px solid #3a3f4a; border-radius:7px; font-size:0.92rem; color:#cdd0d6; font-family:inherit; outline:none; resize:vertical; line-height:1.7; transition:border-color 0.15s;"
      onfocus="this.style.borderColor='#5b9cf6'" onblur="this.style.borderColor='#3a3f4a'"></textarea>
  </div>

  <div style="display:flex; gap:0.8rem;">
    <button type="submit" class="btn btn-primary">등록하기</button>
    <a href="/" class="btn btn-secondary">취소</a>
  </div>
</form>
{% endblock %}

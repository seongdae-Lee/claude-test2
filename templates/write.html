{% extends 'base.html' %}
{% block title %}BOARD - 글쓰기{% endblock %}

{% block content %}
<div class="form-heading">
  <h2 class="page-title">새 글 작성</h2>
</div>

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="form-card">
    <div class="form-grid">
      <div>
        <label class="form-label">작성자</label>
        <input type="text" name="author" class="form-input" required maxlength="50" placeholder="이름">
      </div>
      <div>
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-input" required maxlength="200" placeholder="제목을 입력하세요">
      </div>
    </div>

    <div class="form-textarea-wrap">
      <label class="form-label">내용</label>
      <textarea name="content" class="form-textarea" required rows="12" placeholder="내용을 입력하세요"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">등록하기</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">취소</a>
    </div>
  </div>
</form>
{% endblock %}
